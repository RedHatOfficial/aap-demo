---
name: PR Checks

on:
  pull_request:
    branches: [main, master]
    types: [opened, synchronize, reopened, edited]

jobs:
  metadata:
    name: PR Metadata Check
    runs-on: ubuntu-latest
    steps:
      - name: Check PR has description
        if: github.event.pull_request.body == ''
        run: |
          echo "::error::PR description is required"
          exit 1

      - name: Check PR title length
        run: |
          title="${{ github.event.pull_request.title }}"
          if [ ${#title} -gt 72 ]; then
            echo "::error::PR title is too long (${#title} characters, max 72)"
            exit 1
          fi

      - name: Check PR has labels
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(l => l.name);
            if (labels.length === 0) {
              core.warning('PR has no labels. Consider adding appropriate labels.');
            }

  size:
    name: PR Size Check
    runs-on: ubuntu-latest
    steps:
      - name: Check PR size
        uses: actions/github-script@v7
        with:
          script: |
            const additions = context.payload.pull_request.additions;
            const deletions = context.payload.pull_request.deletions;
            const changes = additions + deletions;

            let size = 'small';
            if (changes > 1000) {
              size = 'xlarge';
            } else if (changes > 500) {
              size = 'large';
            } else if (changes > 100) {
              size = 'medium';
            }

            core.info(`PR size: ${size} (${changes} changes)`);

            if (changes > 1000) {
              core.warning('This PR is very large. Consider breaking it into smaller PRs.');
            }

  conflict-check:
    name: Merge Conflict Check
    runs-on: ubuntu-latest
    steps:
      - name: Check for merge conflicts
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (pr.mergeable === false) {
              core.setFailed('PR has merge conflicts. Please resolve them.');
            } else if (pr.mergeable === null) {
              core.warning('Merge status is unknown. GitHub may still be calculating.');
            } else {
              core.info('No merge conflicts detected.');
            }

  required-files:
    name: Required Files Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for required files
        run: |
          # Check if modifying shell scripts
          if git diff --name-only origin/main | grep -q '\.sh$'; then
            echo "Shell scripts modified, checking for tests..."
            # Could add test file requirements here
          fi

          # Check if modifying docs
          if git diff --name-only origin/main | grep -qE '(includes/|scripts/|addons/)'; then
            if ! git diff --name-only origin/main | grep -q 'README.md\|docs/'; then
              echo "::warning::Code changes detected but no documentation updates"
            fi
          fi

  dependencies:
    name: Dependency Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for new dependencies
        run: |
          if git diff --name-only origin/main | grep -qE '(requirements|package|Gemfile)'; then
            echo "::notice::Dependency files changed. Ensure dependencies are documented."
          fi
