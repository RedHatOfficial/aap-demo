---
name: Lint

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          severity: warning
          scandir: '.'
          ignore_paths: '.git .github docs'
          ignore_names: '*.zsh'

  yamllint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          config_file: .yamllint
          file_or_dir: .
          strict: false

  markdownlint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli

      - name: Run markdownlint
        run: markdownlint . --config .markdownlint.json

  ansible-lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ansible-lint
        run: |
          pip install ansible-lint

      - name: Run ansible-lint
        run: |
          # Only lint if we have Ansible files
          if [ -f "requirements.yml" ] || find . -name "playbook*.yml" -o -name "site.yml" | grep -q .; then
            ansible-lint --force-color --offline || true
          else
            echo "No Ansible playbooks found, skipping ansible-lint"
          fi
        continue-on-error: true

  secretlint:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install detect-secrets
        run: |
          pip install detect-secrets

      - name: Run detect-secrets
        run: |
          # Scan excluding baseline itself
          detect-secrets scan --exclude-files '\.secrets\.baseline' > /tmp/scan-results.json
          # Count secrets per file
          NEW_COUNT=$(jq '[.results[] | length] | add // 0' /tmp/scan-results.json)
          BASELINE_COUNT=$(jq '[.results[] | length] | add // 0' .secrets.baseline)
          if [ "$NEW_COUNT" -gt "$BASELINE_COUNT" ]; then
            echo "New secrets detected! ($NEW_COUNT vs $BASELINE_COUNT baseline)"
            jq -r '.results | to_entries[] | "\(.key): \(.value | length) secrets"' /tmp/scan-results.json
            exit 1
          fi
          echo "No new secrets ($NEW_COUNT matches baseline)"

  shellformat:
    name: Shell Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install shfmt
        run: |
          wget -qO /usr/local/bin/shfmt https://github.com/mvdan/sh/releases/download/v3.13.1/shfmt_v3.13.1_linux_amd64
          chmod +x /usr/local/bin/shfmt

      - name: Run shfmt check
        run: |
          # Find and check all shell scripts
          FILES=$(find . -name '*.sh' ! -path './.venv-lint/*' ! -path './.git/*')
          if [ -n "$FILES" ]; then
            echo "$FILES" | xargs shfmt -d -i 2 -ci -bn
          else
            echo "No shell scripts found"
          fi

  validate-manifests:
    name: Validate Kubernetes Manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          wget -qO- https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kubeconform /usr/local/bin/

      - name: Validate Kubernetes YAMLs
        run: |
          find config/manifests config/crs -name "*.yaml" -o -name "*.yml" | while read -r file; do
            echo "Validating $file"
            kubeconform -ignore-missing-schemas -summary "$file" || true
          done
        continue-on-error: true

  hadolint:
    name: Dockerfile Lint
    runs-on: ubuntu-latest
    if: false  # Enable if Dockerfiles are added
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning
