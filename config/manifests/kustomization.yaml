---
# Kustomization for AAP MINC auto-loaded manifests
# These are applied automatically by MicroShift on startup
#
# Note: CoreDNS config cannot be auto-loaded because it needs the
# router ClusterIP which is only known after the cluster starts.
# Use setup-coredns.sh for that.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - local-path-provisioner.yaml
  - local-path-scc.yaml
