---
# Create or reuse AAP write-scope API token for portal backend (secrets-rhaap-portal aap-token).

- name: Initialize API token variables  # noqa: var-naming[no-role-prefix]
  ansible.builtin.set_fact:
    aap_api_token_resolved: ""
    aap_api_token_valid: false

- name: Use API token from vars when provided  # noqa: var-naming[no-role-prefix]
  ansible.builtin.set_fact:
    aap_api_token_resolved: "{{ aap_api_token }}"
    aap_api_token_valid: true
  when: aap_api_token is defined and aap_api_token | length > 0
  no_log: true

- name: Reuse API token from OpenShift secret  # noqa: var-naming[no-role-prefix]
  ansible.builtin.set_fact:
    aap_api_token_resolved: "{{ portal_oauth_secret_check.resources[0].data['aap-token'] | b64decode }}"
    aap_api_token_valid: true
  when:
    - not (aap_api_token_valid | bool)
    - not (aap_apme_prerequisites_force_token_recreation | bool)
    - portal_oauth_secret_check.resources | default([]) | length > 0
    - portal_oauth_secret_check.resources[0].data['aap-token'] | default('') | length > 0
  no_log: true

- name: Create write-scope API token in AAP  # noqa: var-naming[no-role-prefix]
  ansible.builtin.uri:
    url: "{{ aap_host_normalized }}/api/gateway/v1/tokens/"
    method: POST
    user: "{{ aap_username | default(omit) }}"
    password: "{{ aap_password | default(omit) }}"
    force_basic_auth: "{{ aap_username is defined and aap_username | length > 0 }}"
    headers: "{{ {} if (aap_username is defined and aap_username | length > 0) else {'Authorization': 'Bearer ' + aap_token, 'Content-Type': 'application/json'} }}"  # noqa: yaml[line-length]
    body_format: json
    body:
      description: "{{ aap_apme_prerequisites_api_token_description }}"
      scope: write
      application: "{{ oauth_app_id }}"
    validate_certs: "{{ aap_apme_prerequisites_validate_certs }}"
    timeout: "{{ aap_apme_prerequisites_request_timeout }}"
    status_code: [201]
  register: aap_api_token_create_result
  when:
    - not (aap_api_token_valid | bool)
    - oauth_app_id is defined
    - oauth_app_id | string | length > 0
  no_log: true

- name: Set API token from AAP create response  # noqa: var-naming[no-role-prefix]
  ansible.builtin.set_fact:
    aap_api_token_resolved: "{{ aap_api_token_create_result.json.token }}"
    aap_api_token_valid: true
  when:
    - aap_api_token_create_result is defined
    - aap_api_token_create_result is not skipped
    - aap_api_token_create_result.json.token is defined
    - aap_api_token_create_result.json.token | length > 0
  no_log: true

- name: Fail when API token could not be resolved  # noqa: var-naming[no-role-prefix]
  ansible.builtin.fail:
    msg: >-
      Failed to obtain AAP API token for portal backend access.
      Set aap_api_token in vars or set aap_apme_prerequisites_force_token_recreation=true to create a new token.
  when:
    - (not (aap_api_token_valid | bool)) or (aap_api_token_resolved | default('') | length == 0)

- name: Publish resolved API token for secret creation  # noqa: var-naming[no-role-prefix]
  ansible.builtin.set_fact:
    aap_api_token: "{{ aap_api_token_resolved }}"
  no_log: true
