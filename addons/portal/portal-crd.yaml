apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: portals.aap.ansible.com
spec:
  group: aap.ansible.com
  names:
    kind: Portal
    listKind: PortalList
    plural: portals
    singular: portal
  scope: Namespaced
  versions:
  - name: v1alpha1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            required:
            - aapNamespace
            - clusterDomain
            properties:
              aapNamespace:
                type: string
                description: Namespace where AAP is deployed
              clusterDomain:
                type: string
                description: OpenShift cluster domain (e.g., apps.127.0.0.1.nip.io)
              chartVersion:
                type: string
                description: Portal Helm chart version
                default: "2.2.1"
              organization:
                type: string
                description: AAP organization name to sync
                default: "Default"
          status:
            type: object
            properties:
              conditions:
                type: array
                items:
                  type: object
                  properties:
                    type:
                      type: string
                    status:
                      type: string
                    lastTransitionTime:
                      type: string
                      format: date-time
                    reason:
                      type: string
                    message:
                      type: string
              portalUrl:
                type: string
              oauthClientId:
                type: string
    subresources:
      status: {}
    additionalPrinterColumns:
    - name: AAP Namespace
      type: string
      jsonPath: .spec.aapNamespace
    - name: Portal URL
      type: string
      jsonPath: .status.portalUrl
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
