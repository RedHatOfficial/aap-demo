---
# Install redhat-rhaap-portal with rendered APME values file

- name: Install or upgrade automation portal Helm release  # noqa: var-naming[no-role-prefix]
  kubernetes.core.helm:
    name: "{{ portal_helm_release_name }}"
    chart_ref: "{{ portal_helm_chart_repo_url }}{{ portal_helm_chart_name }}"
    chart_version: "{{ portal_helm_chart_version }}"
    release_namespace: "{{ openshift_project_name }}"
    create_namespace: false
    values_files:
      - "{{ apme_portal_helm_values_path }}"
    wait: true
    wait_timeout: "{{ portal_helm_install_timeout }}s"
    api_key: "{{ openshift_token | default(omit) }}"
    host: "{{ openshift_api_url }}"
    validate_certs: "{{ portal_helm_install_validate_certs }}"
    force: "{{ portal_helm_install_force_upgrade | bool }}"
    atomic: "{{ false if portal_helm_install_force_upgrade | bool else true }}"
  register: portal_helm_install_result

- name: Get portal route  # noqa: var-naming[no-role-prefix]
  kubernetes.core.k8s_info:
    api_version: route.openshift.io/v1
    kind: Route
    namespace: "{{ openshift_project_name }}"
    api_key: "{{ openshift_token | default(omit) }}"
    host: "{{ openshift_api_url }}"
    validate_certs: "{{ portal_helm_install_validate_certs }}"
  register: portal_routes

- name: Set portal URL from route  # noqa: var-naming[no-role-prefix]
  ansible.builtin.set_fact:
    portal_url: "https://{{ (portal_routes.resources | map(attribute='spec.host') | list | first) }}"
  when: portal_routes.resources | default([]) | length > 0
