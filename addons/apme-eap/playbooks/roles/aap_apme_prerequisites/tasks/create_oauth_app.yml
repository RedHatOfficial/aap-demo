---
# Create or reconcile AAP OAuth application and store credentials in OpenShift.
# Never use client_secret from AAP GET responses ($encrypted$ placeholder).

- name: Initialize OAuth variables  # noqa: var-naming[no-role-prefix]
  ansible.builtin.set_fact:
    existing_oauth_app: {}
    oauth_client_id: null
    oauth_client_secret: null
    oauth_app_id: null
    oauth_credentials_valid: false

- name: Check if portal OAuth secret exists in OpenShift  # noqa: var-naming[no-role-prefix]
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Secret
    name: "{{ aap_apme_prerequisites_openshift_secret_name }}"
    namespace: "{{ openshift_project_name }}"
    api_key: "{{ openshift_token | default(omit) }}"
    host: "{{ openshift_api_url }}"
    validate_certs: "{{ aap_apme_prerequisites_openshift_validate_certs }}"
  register: portal_oauth_secret_check
  no_log: true

- name: Check if OAuth application exists in AAP  # noqa: var-naming[no-role-prefix]
  ansible.builtin.uri:
    url: >-
      {{ aap_host_normalized }}/api/gateway/v1/applications/?name={{
      aap_apme_prerequisites_oauth_application_name | urlencode }}&organization__name={{
      aap_organization | urlencode }}
    method: GET
    user: "{{ aap_username | default(omit) }}"
    password: "{{ aap_password | default(omit) }}"
    force_basic_auth: "{{ aap_username is defined and aap_username | length > 0 }}"
    headers: "{{ {} if (aap_username is defined and aap_username | length > 0) else {'Authorization': 'Bearer ' + aap_token, 'Content-Type': 'application/json'} }}"  # noqa: yaml[line-length]
    validate_certs: "{{ aap_apme_prerequisites_validate_certs }}"
    timeout: "{{ aap_apme_prerequisites_request_timeout }}"
    status_code: [200]
  register: existing_oauth_app_check
  no_log: true

- name: Set existing OAuth application fact  # noqa: var-naming[no-role-prefix]
  ansible.builtin.set_fact:
    existing_oauth_app: >-
      {{ existing_oauth_app_check.json.results[0]
         if (existing_oauth_app_check.json.results | default([]) | length > 0)
         else {} }}

- name: Use OAuth credentials from vars when provided  # noqa: var-naming[no-role-prefix]
  ansible.builtin.set_fact:
    oauth_client_id: "{{ aap_oauth_client_id }}"
    oauth_client_secret: "{{ aap_oauth_client_secret }}"
    oauth_app_id: "{{ existing_oauth_app.id | default(none) }}"
    oauth_credentials_valid: true
  when:
    - not (aap_apme_prerequisites_force_oauth_recreation | bool)
    - aap_oauth_client_id is defined and aap_oauth_client_id | length > 0
    - aap_oauth_client_secret is defined and aap_oauth_client_secret | length > 0
  no_log: true

- name: Determine whether stored OAuth credentials are usable  # noqa: var-naming[no-role-prefix]
  ansible.builtin.set_fact:
    oauth_credentials_valid: >-
      {{ not (aap_apme_prerequisites_force_oauth_recreation | bool) and
         (portal_oauth_secret_check.resources | default([]) | length > 0) and
         (portal_oauth_secret_check.resources[0].data['oauth-client-id'] | default('') | length > 0) and
         (portal_oauth_secret_check.resources[0].data['oauth-client-secret'] | default('') | length > 0) and
         (portal_oauth_secret_check.resources[0].data['oauth-client-secret'] | b64decode) != '$encrypted$' and
         (existing_oauth_app.id is defined) and
         (existing_oauth_app.id | string | length > 0) }}
  when: not (oauth_credentials_valid | bool)

- name: Reuse OAuth credentials from OpenShift secret  # noqa: var-naming[no-role-prefix]
  ansible.builtin.set_fact:
    oauth_client_id: "{{ portal_oauth_secret_check.resources[0].data['oauth-client-id'] | b64decode }}"
    oauth_client_secret: "{{ portal_oauth_secret_check.resources[0].data['oauth-client-secret'] | b64decode }}"
    oauth_app_id: "{{ existing_oauth_app.id }}"
  when:
    - oauth_credentials_valid | bool
    - aap_oauth_client_id is not defined or aap_oauth_client_id | length == 0
  no_log: true

- name: Delete unusable OAuth application from AAP  # noqa: var-naming[no-role-prefix]
  ansible.builtin.uri:
    url: "{{ aap_host_normalized }}/api/gateway/v1/applications/{{ existing_oauth_app.id }}/"
    method: DELETE
    user: "{{ aap_username | default(omit) }}"
    password: "{{ aap_password | default(omit) }}"
    force_basic_auth: "{{ aap_username is defined and aap_username | length > 0 }}"
    headers: "{{ {} if (aap_username is defined and aap_username | length > 0) else {'Authorization': 'Bearer ' + aap_token, 'Content-Type': 'application/json'} }}"  # noqa: yaml[line-length]
    validate_certs: "{{ aap_apme_prerequisites_validate_certs }}"
    timeout: "{{ aap_apme_prerequisites_request_timeout }}"
    status_code: [204, 404]
  when:
    - not (oauth_credentials_valid | bool)
    - existing_oauth_app.id is defined
    - aap_oauth_client_id is not defined or aap_oauth_client_id | length == 0
  no_log: true

- name: Look up AAP organization for OAuth application creation  # noqa: var-naming[no-role-prefix]
  ansible.builtin.uri:
    url: "{{ aap_host_normalized }}/api/gateway/v1/organizations/?name={{ aap_organization | urlencode }}"
    method: GET
    user: "{{ aap_username | default(omit) }}"
    password: "{{ aap_password | default(omit) }}"
    force_basic_auth: "{{ aap_username is defined and aap_username | length > 0 }}"
    headers: "{{ {} if (aap_username is defined and aap_username | length > 0) else {'Authorization': 'Bearer ' + aap_token, 'Content-Type': 'application/json'} }}"  # noqa: yaml[line-length]
    validate_certs: "{{ aap_apme_prerequisites_validate_certs }}"
    timeout: "{{ aap_apme_prerequisites_request_timeout }}"
    status_code: [200]
  register: aap_org_lookup
  when: not (oauth_credentials_valid | bool)
  no_log: true

- name: Fail when organization is missing  # noqa: var-naming[no-role-prefix]
  ansible.builtin.fail:
    msg: "Organization '{{ aap_organization }}' not found in AAP."
  when:
    - not (oauth_credentials_valid | bool)
    - aap_org_lookup is defined
    - aap_org_lookup.json.results | default([]) | length == 0

- name: Create OAuth application in AAP  # noqa: var-naming[no-role-prefix]
  ansible.builtin.uri:
    url: "{{ aap_host_normalized }}/api/gateway/v1/applications/"
    method: POST
    user: "{{ aap_username | default(omit) }}"
    password: "{{ aap_password | default(omit) }}"
    force_basic_auth: "{{ aap_username is defined and aap_username | length > 0 }}"
    headers: "{{ {} if (aap_username is defined and aap_username | length > 0) else {'Authorization': 'Bearer ' + aap_token, 'Content-Type': 'application/json'} }}"  # noqa: yaml[line-length]
    body_format: json
    body:
      name: "{{ aap_apme_prerequisites_oauth_application_name }}"
      description: "OAuth application for automation portal (APME EAP)"
      organization: "{{ aap_org_lookup.json.results[0].id }}"
      authorization_grant_type: authorization-code
      client_type: confidential
      redirect_uris: "{{ aap_oauth_redirect_uri }}"
      app_url: "{{ portal_url }}"
    validate_certs: "{{ aap_apme_prerequisites_validate_certs }}"
    timeout: "{{ aap_apme_prerequisites_request_timeout }}"
    status_code: [201]
  register: oauth_create_result
  when: not (oauth_credentials_valid | bool)
  no_log: true

- name: Set OAuth credentials from newly created application  # noqa: var-naming[no-role-prefix]
  ansible.builtin.set_fact:
    oauth_client_id: "{{ oauth_create_result.json.client_id }}"
    oauth_client_secret: "{{ oauth_create_result.json.client_secret }}"
    oauth_app_id: "{{ oauth_create_result.json.id }}"
  when:
    - oauth_create_result is defined
    - oauth_create_result is not skipped
    - oauth_create_result.json is defined
  no_log: true

- name: Fail when OAuth credentials are unavailable  # noqa: var-naming[no-role-prefix]
  ansible.builtin.fail:
    msg: >-
      Failed to obtain OAuth credentials for {{ aap_apme_prerequisites_oauth_application_name }}.
      Set aap_oauth_client_id and aap_oauth_client_secret to reuse an existing app,
      or set aap_apme_prerequisites_force_oauth_recreation=true to recreate the AAP application.
  when:
    - oauth_client_id is not defined or oauth_client_id | length == 0
    - oauth_client_secret is not defined or oauth_client_secret | length == 0

- name: Fail when BYO OAuth lacks app id and no API token  # noqa: var-naming[no-role-prefix]
  ansible.builtin.fail:
    msg: >-
      aap_oauth_client_id/secret are set but no AAP application named
      '{{ aap_apme_prerequisites_oauth_application_name }}' was found for organization
      '{{ aap_organization }}' (needed to auto-create aap_api_token).
      Rename the app to match, or set aap_api_token in vars.
  when:
    - aap_oauth_client_id is defined and aap_oauth_client_id | length > 0
    - aap_oauth_client_secret is defined and aap_oauth_client_secret | length > 0
    - oauth_app_id is not defined or oauth_app_id is none or oauth_app_id | string | length == 0
    - aap_api_token is not defined or aap_api_token | length == 0
