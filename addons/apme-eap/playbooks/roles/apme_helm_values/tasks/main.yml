---
# Render portal Helm values (replaces render-portal-apme-values.sh)

- name: Validate Helm values template exists  # noqa: var-naming[no-role-prefix]
  ansible.builtin.stat:
    path: "{{ apme_helm_values_template }}"
  register: values_template_stat

- name: Fail when template is missing  # noqa: var-naming[no-role-prefix]
  ansible.builtin.fail:
    msg: "Template not found: {{ apme_helm_values_template }}"
  when: not values_template_stat.stat.exists

- name: Copy portal Helm values template  # noqa: var-naming[no-role-prefix]
  ansible.builtin.copy:
    src: "{{ apme_helm_values_template }}"
    dest: "{{ apme_portal_helm_values_path }}"
    mode: "0644"
    remote_src: true

- name: Detect system architecture  # noqa: var-naming[no-role-prefix]
  ansible.builtin.set_fact:
    system_arch: "{{ ansible_architecture }}"

- name: Use upstream RHDH images for ARM64  # noqa: var-naming[no-role-prefix]
  ansible.builtin.set_fact:
    rhdh_image_registry: "quay.io"
    rhdh_image_repository: "rhdh/rhdh-hub-rhel9"
  when: system_arch in ['aarch64', 'arm64']

- name: Use official Red Hat registry for x86_64  # noqa: var-naming[no-role-prefix]
  ansible.builtin.set_fact:
    rhdh_image_registry: "registry.redhat.io"
    rhdh_image_repository: "rhdh/rhdh-hub-rhel9"
  when: system_arch not in ['aarch64', 'arm64']

- name: Substitute portal Helm value placeholders  # noqa: var-naming[no-role-prefix]
  ansible.builtin.replace:
    path: "{{ apme_portal_helm_values_path }}"
    regexp: "{{ item.regexp }}"
    replace: "{{ item.replace }}"
  loop:
    - regexp: "<namespace>"
      replace: "{{ openshift_project_name }}"
    - regexp: "<cluster-router-base>"
      replace: "{{ openshift_cluster_domain }}"
    - regexp: "<plugin-sha>"
      replace: "{{ plugin_sha }}"
    - regexp: "<oci-registry>"
      replace: "{{ oci_registry_normalized }}"

- name: Override RHDH image registry for ARM64  # noqa: var-naming[no-role-prefix]
  ansible.builtin.replace:
    path: "{{ apme_portal_helm_values_path }}"
    regexp: "{{ item.regexp }}"
    replace: "{{ item.replace }}"
  loop:
    - regexp: "registry: registry\\.redhat\\.io"
      replace: "registry: {{ rhdh_image_registry }}"
    - regexp: 'repository: rhdh/rhdh-hub-rhel9'
      replace: "repository: {{ rhdh_image_repository }}"

- name: Normalize optional Dev Spaces base URL  # noqa: var-naming[no-role-prefix]
  ansible.builtin.set_fact:
    apme_helm_values_devspaces_base_url: >-
      {{ (devspaces_base_url | trim | regex_replace('/$', '') ~ '/')
         if (devspaces_base_url is defined and (devspaces_base_url | default('', true) | length) > 0)
         else '' }}

- name: Insert Dev Spaces config when base URL is set  # noqa: var-naming[no-role-prefix]
  ansible.builtin.replace:
    path: "{{ apme_portal_helm_values_path }}"
    regexp: '          # <devspaces-config>'
    replace: "          devSpaces:\n            baseUrl: {{ apme_helm_values_devspaces_base_url }}"
  when: apme_helm_values_devspaces_base_url | length > 0

- name: Remove Dev Spaces placeholder when unset  # noqa: var-naming[no-role-prefix]
  ansible.builtin.replace:
    path: "{{ apme_portal_helm_values_path }}"
    regexp: '(?m)^          # OpenShift Dev Spaces — optional; set devspaces_base_url in vars to enable\.\n          # <devspaces-config>\n'
    replace: ''
  when: apme_helm_values_devspaces_base_url | length == 0

- name: Read rendered Helm values  # noqa: var-naming[no-role-prefix]
  ansible.builtin.slurp:
    src: "{{ apme_portal_helm_values_path }}"
  register: rendered_helm_values

- name: Verify no unresolved placeholders remain  # noqa: var-naming[no-role-prefix]
  ansible.builtin.assert:
    that:
      - rendered_helm_values.content | b64decode is not search('<namespace>')
      - rendered_helm_values.content | b64decode is not search('<cluster-router-base>')
      - rendered_helm_values.content | b64decode is not search('<plugin-sha>')
      - rendered_helm_values.content | b64decode is not search('<oci-registry>')
      - rendered_helm_values.content | b64decode is not search('<devspaces-config>')
    fail_msg: "Unresolved placeholders remain in {{ apme_portal_helm_values_path }}"

- name: Display rendered values path  # noqa: var-naming[no-role-prefix]
  ansible.builtin.debug:
    msg: "Rendered portal Helm values: {{ apme_portal_helm_values_path }}"
