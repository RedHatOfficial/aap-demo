---
# Create AAP OAuth2 API token using basic auth
# Based on portal addon pattern

- name: Create AAP API token
  hosts: localhost
  gather_facts: false
  vars:
    aap_host: "{{ lookup('env', 'AAP_HOST') }}"
    aap_username: "{{ lookup('env', 'AAP_USERNAME') | default('admin', true) }}"
    aap_password: "{{ lookup('env', 'AAP_PASSWORD') }}"
    aap_validate_certs: false
    token_description: "aap-demo APME addon API access"
    token_scope: "write"

  tasks:
    - name: Verify AAP credentials
      ansible.builtin.fail:
        msg: "AAP_HOST and AAP_PASSWORD environment variables must be set"
      when: aap_host == "" or aap_password == ""

    - name: Check if token already exists in secret
      ansible.builtin.command:
        cmd: kubectl get secret aap-api-token -n aap-operator -o jsonpath='{.data.token}'
      register: existing_token
      failed_when: false
      changed_when: false

    - name: Token already exists
      ansible.builtin.debug:
        msg: "API token already exists in Kubernetes secret. Skipping creation."
      when: existing_token.rc == 0 and existing_token.stdout != ""

    - name: Create new API token
      when: existing_token.rc != 0 or existing_token.stdout == ""
      block:
        - name: Create API token via gateway
          ansible.builtin.uri:
            url: "{{ aap_host }}/api/gateway/v1/tokens/"
            method: POST
            url_username: "{{ aap_username }}"
            url_password: "{{ aap_password }}"
            force_basic_auth: true
            body_format: json
            body:
              description: "{{ token_description }}"
              scope: "{{ token_scope }}"
            validate_certs: "{{ aap_validate_certs }}"
            status_code: 201
            return_content: true
          register: token_result

        - name: Verify token was created
          ansible.builtin.fail:
            msg: "Failed to create API token"
          when: token_result.json.token is not defined or token_result.json.token == ""

        - name: Store token in Kubernetes secret
          ansible.builtin.shell:
            cmd: >
              kubectl create secret generic aap-api-token
              -n aap-operator
              --from-literal=token='{{ token_result.json.token }}'
              --dry-run=client -o yaml | kubectl apply -f -
          changed_when: true

        - name: Display success message
          ansible.builtin.debug:
            msg:
              - "✓ API token created successfully"
              - "Token ID: {{ token_result.json.id }}"
              - "Token stored in secret: aap-api-token (namespace: aap-operator)"
